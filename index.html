<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Block Dash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a0a3e; font-family: 'Trebuchet MS', 'Segoe UI', sans-serif; }
  #game { position: fixed; inset: 0; }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }
  .ui { position: absolute; pointer-events: none; z-index: 10; }

  #loading {
    position: absolute; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: #1a0a3e; color: #ffd54a;
    font-size: 18px; font-weight: 700; letter-spacing: 3px;
  }
  #loading.error { color: #ff6a6a; font-size: 14px; padding: 20px; text-align: center; white-space: pre-wrap; }

  #hud { top: 0; left: 0; right: 0; padding: 12px 14px; display: flex; justify-content: space-between; align-items: flex-start; }
  .left-hud { display: flex; flex-direction: column; gap: 6px; }
  .top-row { display: flex; align-items: center; gap: 6px; }
  .coin-box {
    background: #1a1420;
    border: 3px solid #ffd54a;
    border-radius: 8px;
    padding: 5px 12px 5px 6px;
    display: flex; align-items: center; gap: 6px;
    color: #fff; font-weight: 900; font-size: 16px;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.5);
    min-width: 78px;
  }
  .gold-bar-icon {
    width: 20px; height: 12px;
    background: #ffd54a;
    box-shadow: inset 0 -2px 0 #c67a00, inset 0 2px 0 #fff5a0;
  }
  .multi-box {
    background: #7fff3f;
    border: 3px solid #1a6a00;
    border-radius: 6px;
    padding: 2px 8px;
    color: #1a3a00; font-weight: 900; font-size: 16px;
    text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
    box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
  }
  .multi-box.bump { animation: bump 0.3s; }
  @keyframes bump { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
  .score {
    color: #fff; font-weight: 900; font-size: 18px;
    text-shadow: 2px 2px 0 #000;
    letter-spacing: 1px;
  }
  .stage-box {
    background: #2a1a5e;
    border: 2px solid #fff;
    border-radius: 6px;
    padding: 3px 10px;
    color: #fff; font-weight: 900; font-size: 12px;
    letter-spacing: 1px;
    text-shadow: 1px 1px 0 #000;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.5);
  }
  .distance-text {
    color: #ffd54a; font-size: 12px; font-weight: 700;
    text-shadow: 1px 1px 0 #000;
    letter-spacing: 1px;
  }
  .pause-btn {
    width: 40px; height: 40px; border-radius: 6px;
    background: #ff8c1a;
    border: 3px solid #fff;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 900; font-size: 14px;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
    pointer-events: auto; cursor: pointer;
  }

  /* 미션 박스 (HUD 하단) */
  .mission-box {
    margin-top: 4px;
    background: rgba(26, 10, 62, 0.85);
    border: 2px solid #a88ce0;
    border-radius: 6px;
    padding: 4px 10px;
    color: #fff; font-size: 11px;
    max-width: 200px;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.5);
  }
  .mission-title {
    color: #a88ce0; font-weight: 900; font-size: 9px;
    letter-spacing: 1.5px; margin-bottom: 2px;
  }
  .mission-text {
    font-weight: 700; letter-spacing: 0.5px;
    text-shadow: 1px 1px 0 #000;
  }
  .mission-progress {
    margin-top: 3px;
    height: 6px; background: #2a1a4a;
    border-radius: 3px; overflow: hidden;
    position: relative;
  }
  .mission-progress-fill {
    height: 100%; background: linear-gradient(90deg, #7fff3f, #c0ff70);
    transition: width 0.3s;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
  }

  /* 파워업 인디케이터 */
  .powerup-bar {
    position: absolute;
    top: 60px; right: 14px;
    display: flex; flex-direction: column; gap: 6px;
    z-index: 10;
  }
  .powerup-icon {
    width: 44px; height: 44px; border-radius: 8px;
    background: #1a0a3e;
    border: 3px solid #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    position: relative;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.5);
  }
  .powerup-icon.magnet { border-color: #ff5a5a; }
  .powerup-icon.shield { border-color: #4acfff; }
  .powerup-icon.boost { border-color: #ffd54a; }
  .powerup-icon.x2 { border-color: #7fff3f; }
  .powerup-timer {
    position: absolute;
    bottom: -2px; left: 0; right: 0;
    height: 4px; background: #fff;
    border-radius: 0 0 4px 4px;
    transform-origin: left;
  }

  /* 스테이지 전환 배너 */
  #stage-banner {
    position: absolute;
    top: 40%; left: 0; right: 0;
    text-align: center;
    z-index: 30;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #stage-banner.show { opacity: 1; animation: stageIn 0.6s ease-out; }
  @keyframes stageIn {
    0% { transform: translateY(-50px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }
  .stage-banner-inner {
    display: inline-block;
    background: rgba(26, 10, 62, 0.9);
    border: 4px solid #ffd54a;
    border-radius: 12px;
    padding: 20px 40px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  }
  .stage-banner-label {
    color: #ffd54a; font-size: 14px; font-weight: 900;
    letter-spacing: 4px;
    text-shadow: 2px 2px 0 #000;
  }
  .stage-banner-name {
    color: #fff; font-size: 28px; font-weight: 900;
    letter-spacing: 3px; margin-top: 4px;
    text-shadow: 3px 3px 0 #000;
    font-family: 'Courier New', monospace;
  }

  /* 미션 완료 팝업 */
  #mission-complete {
    position: absolute;
    top: 25%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 30;
    pointer-events: none;
    opacity: 0;
  }
  #mission-complete.show { animation: missionComplete 2s ease-out; }
  @keyframes missionComplete {
    0% { opacity: 0; transform: translate(-50%, -80%) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    30% { transform: translate(-50%, -50%) scale(1); }
    80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -80%) scale(0.9); }
  }
  .mission-complete-inner {
    background: #2a9a00;
    border: 4px solid #7fff3f;
    border-radius: 12px;
    padding: 14px 30px;
    color: #fff;
    text-align: center;
    box-shadow: 6px 6px 0 rgba(0,0,0,0.5);
  }
  .mission-complete-inner .label {
    font-size: 11px; letter-spacing: 3px; opacity: 0.9;
  }
  .mission-complete-inner .name {
    font-size: 18px; font-weight: 900; margin: 4px 0;
    text-shadow: 2px 2px 0 #1a5a00;
  }
  .mission-complete-inner .reward {
    font-size: 14px; color: #ffd54a;
    font-weight: 900; text-shadow: 2px 2px 0 #000;
  }

  /* 시작 화면 */
  #start-screen {
    position: absolute; inset: 0; z-index: 20;
    background: linear-gradient(180deg, #4a8adc 0%, #1a3a7a 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #fff; padding: 20px;
    overflow: hidden;
  }
  #start-screen.hidden { display: none; }
  #start-screen::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(45deg, rgba(255,255,255,0.05) 25%, transparent 25%),
      linear-gradient(-45deg, rgba(255,255,255,0.05) 25%, transparent 25%);
    background-size: 40px 40px;
  }
  #start-screen h1 {
    font-size: clamp(44px, 11vw, 78px); font-weight: 900;
    color: #ffd54a;
    letter-spacing: 3px; margin-bottom: 4px;
    text-shadow: 4px 4px 0 #8b3a00, 8px 8px 0 rgba(0,0,0,0.3);
    position: relative; z-index: 1;
    font-family: 'Courier New', 'Trebuchet MS', monospace;
  }
  #start-screen .sub {
    color: #fff; font-size: 13px; margin-bottom: 28px; letter-spacing: 4px;
    text-shadow: 2px 2px 0 #000;
    position: relative; z-index: 1;
  }
  .char-select { display: flex; gap: 12px; margin-bottom: 22px; position: relative; z-index: 1; }
  .char-card {
    width: 82px; height: 100px;
    background: rgba(0,0,0,0.3);
    border: 3px solid #fff;
    border-radius: 8px;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    padding-bottom: 8px; cursor: pointer;
    transition: transform 0.15s;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.4);
  }
  .char-card .preview {
    flex: 1; width: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 38px;
    filter: drop-shadow(0 3px 0 rgba(0,0,0,0.4));
  }
  .char-card .name {
    color: #fff; font-weight: 900; font-size: 10px; letter-spacing: 2px;
    text-shadow: 1px 1px 0 #000;
  }
  .char-card.selected {
    border-color: #ffd54a;
    background: #ff8c1a;
    transform: translateY(-6px);
    box-shadow: 6px 10px 0 rgba(0,0,0,0.4);
  }
  .play-btn {
    padding: 14px 50px;
    background: #ffd54a;
    border: 4px solid #fff;
    border-radius: 12px;
    color: #8b3a00; font-weight: 900; font-size: 20px;
    letter-spacing: 4px; cursor: pointer;
    box-shadow: 6px 6px 0 #8b3a00;
    text-shadow: 2px 2px 0 rgba(255,255,255,0.5);
    font-family: 'Courier New', monospace;
    position: relative; z-index: 1;
  }
  .play-btn:active { transform: translate(3px, 3px); box-shadow: 3px 3px 0 #8b3a00; }

  /* 게임 설명 */
  .info-panel {
    margin-top: 20px;
    display: flex;
    gap: 16px;
    color: #fff;
    font-size: 10px;
    text-shadow: 1px 1px 0 #000;
    position: relative; z-index: 1;
    letter-spacing: 1px;
  }
  .info-item {
    display: flex; flex-direction: column; align-items: center;
    padding: 6px 10px;
    background: rgba(0,0,0,0.3);
    border-radius: 6px;
    min-width: 60px;
  }
  .info-emoji { font-size: 18px; margin-bottom: 2px; }

  .hint {
    position: absolute; bottom: 14px; left: 0; right: 0;
    text-align: center; color: rgba(255,255,255,0.7); font-size: 10px; letter-spacing: 2px;
    z-index: 1;
  }

  /* 게임오버 */
  #gameover {
    position: absolute; inset: 0; z-index: 20;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column; color: #fff;
    padding: 20px;
  }
  #gameover.show { display: flex; }
  #gameover .panel {
    background: #2a1a5e;
    border: 4px solid #ffd54a;
    border-radius: 12px;
    padding: 24px 32px;
    text-align: center;
    box-shadow: 8px 8px 0 #000;
    max-width: 320px;
  }
  #gameover h2 {
    font-size: 32px; font-weight: 900;
    color: #ff6a6a;
    margin-bottom: 14px; letter-spacing: 3px;
    text-shadow: 3px 3px 0 #4a0a0a;
    font-family: 'Courier New', monospace;
  }
  .stat { font-size: 12px; color: #bba3ff; margin: 8px 0; letter-spacing: 2px; }
  .stat b { color: #ffd54a; font-size: 22px; display: block; margin-top: 2px; text-shadow: 2px 2px 0 #000; }
  .best-label { color: #7fff3f; font-size: 10px; font-weight: 900; margin-top: 2px; letter-spacing: 2px; }
  .retry-btn {
    margin-top: 18px; padding: 10px 32px;
    background: #7fff3f;
    border: 3px solid #fff;
    border-radius: 8px;
    color: #1a3a00; font-weight: 900; font-size: 15px;
    letter-spacing: 2px; cursor: pointer;
    box-shadow: 5px 5px 0 #1a5a00;
    text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
    font-family: 'Courier New', monospace;
  }

  /* 사운드 토글 버튼 */
  .sound-btn {
    width: 40px; height: 40px; border-radius: 6px;
    background: #6a4aa0;
    border: 3px solid #fff;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 900; font-size: 14px;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
    pointer-events: auto; cursor: pointer;
    margin-right: 6px;
  }
  .sound-btn.muted { background: #555; }

  #fx-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 8; }
  .coin-fx {
    position: absolute;
    width: 14px; height: 10px;
    background: #ffd54a;
    box-shadow: inset 0 -2px 0 #c67a00, 0 0 8px rgba(255,200,0,0.8);
  }
</style>
</head>
<body>
<div id="game">
  <div id="loading">LOADING...</div>

  <div id="hud" class="ui" style="display:none;">
    <div class="left-hud">
      <div class="top-row">
        <div class="coin-box">
          <div class="gold-bar-icon"></div>
          <span id="coin-count">0</span>
        </div>
        <div class="multi-box" id="multi-box">×<span id="multi">1</span></div>
      </div>
      <div class="top-row">
        <div class="stage-box">STAGE <span id="stage-num">1</span></div>
        <div class="score"><span id="score">0</span></div>
        <div class="distance-text"><span id="distance">0</span>m</div>
      </div>
      <div class="mission-box" id="mission-box">
        <div class="mission-title">MISSION</div>
        <div class="mission-text" id="mission-text">-</div>
        <div class="mission-progress">
          <div class="mission-progress-fill" id="mission-progress" style="width:0%"></div>
        </div>
      </div>
    </div>
    <div style="display:flex;">
      <div class="sound-btn" id="sound-btn">🔊</div>
      <div class="pause-btn" id="pause-btn">Ⅱ</div>
    </div>
  </div>

  <div class="powerup-bar" id="powerup-bar" style="display:none;"></div>

  <div id="stage-banner" class="ui">
    <div class="stage-banner-inner">
      <div class="stage-banner-label">STAGE <span id="banner-num">1</span></div>
      <div class="stage-banner-name" id="banner-name">GRASSLAND</div>
    </div>
  </div>

  <div id="mission-complete">
    <div class="mission-complete-inner">
      <div class="label">MISSION CLEAR!</div>
      <div class="name" id="mc-name">-</div>
      <div class="reward" id="mc-reward">+500 pts</div>
    </div>
  </div>

  <div id="fx-overlay"></div>

  <div id="start-screen" class="hidden">
    <h1>BLOCK DASH</h1>
    <div class="sub">★ LOW-POLY RUNNER ★</div>
    <div class="char-select" id="char-select">
      <div class="char-card selected" data-char="0">
        <div class="preview">🐥</div>
        <div class="name">CHICK</div>
      </div>
      <div class="char-card" data-char="1">
        <div class="preview">🐸</div>
        <div class="name">FROG</div>
      </div>
      <div class="char-card" data-char="2">
        <div class="preview">🐼</div>
        <div class="name">PANDA</div>
      </div>
    </div>
    <button class="play-btn" id="play-btn">PLAY</button>
    <div class="info-panel">
      <div class="info-item"><div class="info-emoji">🧲</div>MAGNET</div>
      <div class="info-item"><div class="info-emoji">🛡️</div>SHIELD</div>
      <div class="info-item"><div class="info-emoji">⚡</div>BOOST</div>
      <div class="info-item"><div class="info-emoji">✨</div>x2 COINS</div>
    </div>
    <div class="hint">← → 이동 · ↑ 점프 · ↓ 슬라이드 · 모바일 스와이프</div>
  </div>

  <div id="gameover">
    <div class="panel">
      <h2>GAME OVER</h2>
      <div class="stat">SCORE <b id="final-score">0</b><div class="best-label" id="best-label" style="display:none;">NEW BEST!</div></div>
      <div class="stat">BEST <b id="best-score">0</b></div>
      <div class="stat">GOLD <b id="final-coins">0</b></div>
      <div class="stat">DISTANCE <b id="final-dist">0m</b></div>
      <div class="stat">STAGE REACHED <b id="final-stage">1</b></div>
      <button class="retry-btn" id="retry-btn">RETRY</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(() => {
  const loadingEl = document.getElementById('loading');

  window.addEventListener('error', (e) => {
    loadingEl.classList.add('error');
    loadingEl.textContent = 'ERROR: ' + e.message + '\n\n' + (e.filename || '') + ':' + (e.lineno || '');
  });

  if (typeof THREE === 'undefined') {
    loadingEl.classList.add('error');
    loadingEl.textContent = 'Three.js 로드 실패';
    return;
  }

  try {

  // ============================================
  // 🎵 Web Audio 사운드 엔진 (칩튠 BGM + 효과음)
  // ============================================
  const Audio = {
    ctx: null,
    masterGain: null,
    bgmGain: null,
    sfxGain: null,
    enabled: true,
    bgmPlaying: false,
    bgmTimer: null,
    currentStageIdx: 0,

    init() {
      if (this.ctx) return;
      try {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.value = 0.5;
        this.masterGain.connect(this.ctx.destination);
        this.bgmGain = this.ctx.createGain();
        this.bgmGain.gain.value = 0.25;
        this.bgmGain.connect(this.masterGain);
        this.sfxGain = this.ctx.createGain();
        this.sfxGain.gain.value = 0.6;
        this.sfxGain.connect(this.masterGain);
      } catch (e) {
        console.warn('Audio not supported', e);
      }
    },

    resume() {
      if (this.ctx && this.ctx.state === 'suspended') {
        this.ctx.resume();
      }
    },

    // 단일 음 재생 (효과음용)
    beep(freq, duration, type, volume, destGain) {
      if (!this.ctx || !this.enabled) return;
      type = type || 'square';
      volume = volume || 0.3;
      destGain = destGain || this.sfxGain;

      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(volume, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
      osc.connect(gain);
      gain.connect(destGain);
      osc.start();
      osc.stop(this.ctx.currentTime + duration);
    },

    // 주파수 슬라이드 (점프, 수집)
    slide(from, to, duration, type, volume) {
      if (!this.ctx || !this.enabled) return;
      type = type || 'square';
      volume = volume || 0.25;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(from, this.ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(to, this.ctx.currentTime + duration);
      gain.gain.setValueAtTime(volume, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
      osc.connect(gain);
      gain.connect(this.sfxGain);
      osc.start();
      osc.stop(this.ctx.currentTime + duration);
    },

    // 효과음 프리셋
    coinSFX() { this.slide(880, 1320, 0.1, 'square', 0.2); },
    jumpSFX() { this.slide(440, 880, 0.15, 'triangle', 0.25); },
    slideSFX() { this.slide(600, 200, 0.2, 'sawtooth', 0.2); },
    crashSFX() {
      this.beep(120, 0.3, 'sawtooth', 0.35);
      setTimeout(() => this.beep(80, 0.3, 'sawtooth', 0.3), 80);
    },
    powerupSFX() {
      this.slide(440, 880, 0.08, 'square', 0.25);
      setTimeout(() => this.slide(660, 1320, 0.08, 'square', 0.25), 80);
      setTimeout(() => this.slide(880, 1760, 0.12, 'square', 0.25), 160);
    },
    missionSFX() {
      const notes = [523, 659, 784, 1047];
      notes.forEach((f, i) => setTimeout(() => this.beep(f, 0.15, 'square', 0.25), i * 100));
    },
    stageSFX() {
      const notes = [392, 523, 659, 784, 1047];
      notes.forEach((f, i) => setTimeout(() => this.beep(f, 0.2, 'triangle', 0.3), i * 120));
    },
    multiBumpSFX() { this.slide(660, 990, 0.1, 'square', 0.2); },

    // ============================
    // BGM (스테이지별 칩튠 루프)
    // ============================
    // 스테이지별 멜로디 (음계 반음 단위, null = 쉼)
    // 4/4박자, 각 스텝은 1/8박
    bgmTracks: [
      // GRASSLAND - 경쾌한 C메이저
      {
        tempo: 130,
        baseOct: 4,

      }
    ],

    midiToFreq(midi) {
      return 440 * Math.pow(2, (midi - 69) / 12);
    },

    playBGMNote(midiNote, duration, type, gain) {
      if (!this.ctx || !this.enabled || midiNote === null) return;
      const osc = this.ctx.createOscillator();
      const envGain = this.ctx.createGain();
      osc.type = type;
      osc.frequency.value = this.midiToFreq(midiNote);
      envGain.gain.setValueAtTime(0, this.ctx.currentTime);
      envGain.gain.linearRampToValueAtTime(gain, this.ctx.currentTime + 0.01);
      envGain.gain.setValueAtTime(gain, this.ctx.currentTime + duration * 0.7);
      envGain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
      osc.connect(envGain);
      envGain.connect(this.bgmGain);
      osc.start();
      osc.stop(this.ctx.currentTime + duration);
    },

    stopBGM() {
      if (this.bgmTimer) {
        clearTimeout(this.bgmTimer);
        this.bgmTimer = null;
      }
      this.bgmPlaying = false;
    },

    startBGM(stageIdx) {
      this.stopBGM();
      if (!this.ctx || !this.enabled) return;
      this.currentStageIdx = stageIdx;
      this.bgmPlaying = true;
      this.scheduleBGMLoop();
    },

    scheduleBGMLoop() {
      if (!this.bgmPlaying || !this.enabled) return;
      const track = this.bgmTracks[this.currentStageIdx % this.bgmTracks.length];
      const stepDuration = 60 / track.tempo / 2; // 1/8 note in seconds
      let stepIndex = 0;

      const playStep = () => {
        if (!this.bgmPlaying) return;
        const melodyNote = track.melody[stepIndex % track.melody.length];
        const bassNote = track.bass[stepIndex % track.bass.length];

        if (melodyNote !== null) {
          this.playBGMNote(melodyNote, stepDuration * 1.5, 'square', 0.15);
        }
        if (bassNote !== null) {
          this.playBGMNote(bassNote, stepDuration * 2, 'triangle', 0.2);
        }
        // 드럼 느낌 (저음 노이즈)
        if (stepIndex % 4 === 0) {
          this.playBGMNote(36, stepDuration * 0.3, 'sawtooth', 0.15);
        } else if (stepIndex % 4 === 2) {
          this.playBGMNote(48, stepDuration * 0.2, 'square', 0.1);
        }

        stepIndex++;
        this.bgmTimer = setTimeout(playStep, stepDuration * 1000);
      };
      playStep();
    },

    setEnabled(on) {
      this.enabled = on;
      if (!on) this.stopBGM();
    }

  function createSegment(z) {
    const group = new THREE.Group();
    const stage = STAGES[currentStage];
    const trackMat = flatMat(stage.track[0]);
    const trackMatAlt = flatMat(stage.track[1]);

    for (let row = 0; row < 6; row++) {
      for (let col = 0; col < 3; col++) {
        const isAlt = (row + col) % 2 === 0;
        const block = new THREE.Mesh(
          new THREE.BoxGeometry(2, 0.3, 2),
          isAlt ? trackMat : trackMatAlt
        );
        block.position.set(
          -2 + col * 2,
          -0.15,
          -SEGMENT_LENGTH/2 + 1 + row * 2
        );
        block.receiveShadow = true;
        group.add(block);
      }
    }

    for (let side = -1; side <= 1; side += 2) {
      for (let r = 0; r < 6; r++) {
        const grassShade = Math.random() > 0.5 ? stage.grass[0] : stage.grass[1];
        const grass = new THREE.Mesh(
          new THREE.BoxGeometry(4, 0.4, 2),
          flatMat(grassShade)
        );
        grass.position.set(side * 5, -0.1, -SEGMENT_LENGTH/2 + 1 + r * 2);
        grass.receiveShadow = true;
        grass.castShadow = true;
        group.add(grass);
      }
      const decorCount = 2 + Math.floor(Math.random() * 2);
      for (let d = 0; d < decorCount; d++) {
        const decorType = Math.random();
        let decor;
        if (decorType < 0.6) decor = createTree(stage);
        else if (decorType < 0.85) decor = createBush(stage);
        else decor = createFlower(stage);
        decor.position.set(
          side * (4 + Math.random() * 2),
          0,
          -SEGMENT_LENGTH/2 + Math.random() * SEGMENT_LENGTH
        );
        group.add(decor);
      }
    }

    group.position.z = z;
    scene.add(group);
    return group;
  }

  function createTree(stage) {
    const g = new THREE.Group();
    const trunkHeight = 0.8 + Math.random() * 0.4;
    const trunk = new THREE.Mesh(
      new THREE.BoxGeometry(0.35, trunkHeight, 0.35),
      flatMat(stage.trunk)
    );
    trunk.position.y = trunkHeight / 2 + 0.1;

    const leafColor = stage.leaves[Math.floor(Math.random() * stage.leaves.length)];
    const leafMat = flatMat(leafColor);

    const foliage = new THREE.Mesh(

  function spawnObjectsAhead(zStart) {
    const rows = 4;
    for (let r = 0; r < rows; r++) {
      const rowZ = zStart - r * 3.2 - Math.random() * 1;
      const pattern = Math.random();

      // 파워업 (2% 확률, 30초 후부터)
      if (pattern < 0.025 && state.runTime > 15) {
        const types = ['magnet', 'shield', 'boost', 'x2'];
        const ptype = types[Math.floor(Math.random() * types.length)];
        const lane = Math.floor(Math.random() * 3);
        const p = createPowerup(ptype);
        p.position.set(LANE_X[lane], 0, rowZ);
        scene.add(p);
        activeObjects.push({ mesh: p, type: 'powerup', lane, z: rowZ, ptype });
      } else if (pattern < 0.1 && state.runTime > 10) {
        const lane = Math.floor(Math.random() * 3);
        const pile = createGoldPile();
        pile.position.set(LANE_X[lane], 0, rowZ);
        scene.add(pile);
        activeObjects.push({ mesh: pile, type: 'goldpile', lane, z: rowZ, value: 10 });
      } else if (pattern < 0.4) {
        const blockedLanes = new Set();
        const count = Math.random() < 0.35 ? 2 : 1;
        for (let i = 0; i < count; i++) {
          let lane = Math.floor(Math.random() * 3);
          let tries = 0;
          while (blockedLanes.has(lane) && tries < 3) { lane = Math.floor(Math.random() * 3); tries++; }
          if (blockedLanes.has(lane)) continue;
          blockedLanes.add(lane);
          const rand = Math.random();
          let obstacleType, mesh;
          if (rand < 0.45) { obstacleType = 'barrier'; mesh = createBarrier(); }
          else if (rand < 0.75) { obstacleType = 'lowbar'; mesh = createLowBar(); }
          else { obstacleType = 'crate'; mesh = createCrate(); }
          mesh.position.set(LANE_X[lane], 0, rowZ);
          scene.add(mesh);
          activeObjects.push({ mesh, type: obstacleType, lane, z: rowZ });
        }
        for (let lane = 0; lane < 3; lane++) {
          if (blockedLanes.has(lane)) continue;
          if (Math.random() < 0.65) {
            const bar = createGoldBar();
            bar.position.set(LANE_X[lane], 0.5, rowZ);
            scene.add(bar);
            activeObjects.push({ mesh: bar, type: 'gold', lane, z: rowZ });
          }
        }
      } else if (pattern < 0.78) {
        const lane = Math.floor(Math.random() * 3);
        for (let c = 0; c < 4; c++) {
          const bar = createGoldBar();
          bar.position.set(LANE_X[lane], 0.5, rowZ - c * 0.8);
          scene.add(bar);
          activeObjects.push({ mesh: bar, type: 'gold', lane, z: rowZ - c * 0.8 });
        }
      } else {
        if (Math.random() < 0.6) {
          const lane = Math.floor(Math.random() * 3);
          const bar = createGoldBar();
          bar.position.set(LANE_X[lane], 0.5, rowZ);
          scene.add(bar);
          activeObjects.push({ mesh: bar, type: 'gold', lane, z: rowZ });
        }
      }
    }
  }

  let currentMission = null;
  let missionProgress = 0;
  let missionIdx = 0;

  function selectNextMission() {
    missionIdx = (missionIdx + 1) % MISSION_POOL.length;
    currentMission = MISSION_POOL[missionIdx];
    missionProgress = 0;
    updateMissionUI();
  }

  function updateMissionUI() {
    if (!currentMission) return;
    document.getElementById('mission-text').textContent = currentMission.text;
    const pct = Math.min(100, (missionProgress / currentMission.target) * 100);
    document.getElementById('mission-progress').style.width = pct + '%';
  }

  function progressMission(type, amount, absoluteValue) {
    if (!currentMission || currentMission.type !== type) return;
    if (absoluteValue !== undefined) {
      missionProgress = Math.max(missionProgress, absoluteValue);
    } else {
      missionProgress += amount;
    }
    if (missionProgress >= currentMission.target) {
      completeMission();
    } else {
      updateMissionUI();
    }
  }

  function completeMission() {
    const reward = currentMission.reward;
    state.score += reward;
    Audio.missionSFX();
    // 팝업 표시
    document.getElementById('mc-name').textContent = currentMission.text;
    document.getElementById('mc-reward').textContent = '+' + reward + ' pts';
    const el = document.getElementById('mission-complete');
    el.classList.remove('show');
    void el.offsetWidth;
    el.classList.add('show');
    // 다음 미션
    setTimeout(selectNextMission, 500);
  }

  const powerupState = {
    magnet: 0,   // 남은 시간 (초)
    shield: 0,
    boost: 0,
    x2: 0
  };
  const POWERUP_DURATION = 6;

  function activatePowerup(type) {
    powerupState[type] = POWERUP_DURATION;
    progressMission('powerup', 1);
    updatePowerupUI();
  }

  function updatePowerupUI() {
    const bar = document.getElementById('powerup-bar');
    const icons = { magnet: '🧲', shield: '🛡️', boost: '⚡', x2: '✨' };
    bar.innerHTML = '';
    let hasAny = false;
    for (const [type, time] of Object.entries(powerupState)) {
      if (time > 0) {
        hasAny = true;
        const el = document.createElement('div');
        el.className = 'powerup-icon ' + type;
        el.innerHTML = icons[type] + '<div class="powerup-timer" style="transform:scaleX(' + (time / POWERUP_DURATION) + ')"></div>';
        bar.appendChild(el);
      }
    }
    bar.style.display = hasAny ? 'flex' : 'none';
  }

  function moveLane(dir) {
    if (!state.running || state.paused) return;
    state.laneTarget = Math.max(0, Math.min(2, state.laneTarget + dir));
  }
  function jump() {
    if (!state.running || state.paused) return;
    if (!state.jumping && !state.sliding) {
      state.jumpVel = 8.5;
      state.jumping = true;
      state.jumpCount++;
      progressMission('jump', 1);
      Audio.jumpSFX();
    }
  }
  function slide() {
    if (!state.running || state.paused) return;
    if (!state.jumping && !state.sliding) {
      state.sliding = true;
      state.slideTimer = 0.6;
      state.slideCount++;
      progressMission('slide', 1);
      Audio.slideSFX();
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a') { moveLane(-1); e.preventDefault(); }
    else if (e.key === 'ArrowRight' || e.key === 'd') { moveLane(1); e.preventDefault(); }
    else if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') { jump(); e.preventDefault(); }
    else if (e.key === 'ArrowDown' || e.key === 's') { slide(); e.preventDefault(); }
  });

  let touchStart = null;
  renderer.domElement.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  renderer.domElement.addEventListener('touchend', (e) => {
    if (!touchStart || !state.running) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    const absX = Math.abs(dx), absY = Math.abs(dy);
    if (Math.max(absX, absY) < 25) { jump(); touchStart = null; return; }
    if (absX > absY) {
      if (dx > 0) moveLane(1); else moveLane(-1);
    } else {
      if (dy > 0) slide(); else jump();
    }
    touchStart = null;
  }, { passive: true });

  function checkCollision() {
    const px = player.position.x;
    const py = player.position.y;

    // 자석: 가까운 금괴 끌어당김
    if (powerupState.magnet > 0) {
      for (const obj of activeObjects) {
        if (obj.type === 'gold' || obj.type === 'goldpile') {
          const dx = obj.mesh.position.x - px;
          const dz = obj.mesh.position.z - player.position.z;
          const dist = Math.sqrt(dx*dx + dz*dz);
          if (dist < 4.5) {
            const pull = Math.min(0.3, 1.5 / Math.max(0.1, dist));
            obj.mesh.position.x -= dx * pull;
            obj.mesh.position.z -= dz * pull;
          }
        }
      }
    }

    for (let i = activeObjects.length - 1; i >= 0; i--) {
      const obj = activeObjects[i];
      const dx = Math.abs(obj.mesh.position.x - px);
      const dz = Math.abs(obj.mesh.position.z - player.position.z);

      const pickupRange = powerupState.magnet > 0 ? 1.0 : 0.7;
      const obstacleRange = 0.7;

      if (obj.type === 'gold' || obj.type === 'goldpile' || obj.type === 'powerup') {
        if (dx < pickupRange && dz < 0.8) {
          if (obj.type === 'gold') {
            scene.remove(obj.mesh);
            activeObjects.splice(i, 1);
            collectGold(1);
            spawnCoinFX(obj.mesh.position);
            Audio.coinSFX();
          } else if (obj.type === 'goldpile') {
            scene.remove(obj.mesh);
            activeObjects.splice(i, 1);
            collectGold(obj.value || 10);
            spawnCoinFX(obj.mesh.position, 8);
            state.goldRushTime = 3;
            Audio.powerupSFX();
          } else if (obj.type === 'powerup') {
            scene.remove(obj.mesh);
            activeObjects.splice(i, 1);
            activatePowerup(obj.ptype);
            spawnCoinFX(obj.mesh.position, 6);
            Audio.powerupSFX();
          }
        }
      } else if (dx < obstacleRange && dz < 0.8) {
        // 장애물
        if (powerupState.shield > 0 || powerupState.boost > 0) {
          // 방어막/부스트 — 장애물 파괴
          scene.remove(obj.mesh);
          activeObjects.splice(i, 1);
          spawnCoinFX(obj.mesh.position, 5);
          // 방어막은 1번 쓰고 해제
          if (powerupState.shield > 0 && powerupState.boost <= 0) {
            powerupState.shield = 0;
            updatePowerupUI();
          }
          continue;
        }
        if (obj.type === 'barrier') {
          if (py > 1.2) continue;
          gameOver(); return;
        } else if (obj.type === 'lowbar') {
          if (state.sliding) continue;
          gameOver(); return;
        } else if (obj.type === 'crate') {
          if (py > 1.0) continue;
          gameOver(); return;
        }
      }
    }
  }

  function collectGold(amount) {
    const multiplier = powerupState.x2 > 0 ? 2 : 1;
    const gain = amount * state.multi * multiplier;
    state.coins += gain;
    state.score += 10 * gain;
    const prevMulti = state.multi;
    const threshold = Math.floor(state.coins / 15);
    state.multi = Math.min(20, 1 + threshold);
    if (state.multi > prevMulti) {
      const box = document.getElementById('multi-box');
      box.classList.remove('bump');
      void box.offsetWidth;
      box.classList.add('bump');
      progressMission('multi', 0, state.multi);
      Audio.multiBumpSFX();
    }
    progressMission('gold', gain);
    updateHUD();
  }

  function spawnCoinFX(worldPos, count) {
    count = count || 3;
    const vec = worldPos.clone().project(camera);
    const sx = (vec.x * 0.5 + 0.5) * window.innerWidth;
    const sy = (-vec.y * 0.5 + 0.5) * window.innerHeight;
    const overlay = document.getElementById('fx-overlay');
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'coin-fx';
      el.style.left = sx + 'px';
      el.style.top = sy + 'px';
      overlay.appendChild(el);
      const angle = Math.random() * Math.PI * 2;
      const dist = 50 + Math.random() * 50;
      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist - 40;
      el.animate([
        { transform: 'translate(-50%, -50%) scale(1) rotate(0deg)', opacity: 1 },
        { transform: 'translate(calc(-50% + ' + tx + 'px), calc(-50% + ' + ty + 'px)) scale(0.3) rotate(360deg)', opacity: 0 }
      ], { duration: 600, easing: 'ease-out' });
      setTimeout(() => el.remove(), 650);
    }
  }

  function gameOver() {
    state.running = false;
    Audio.crashSFX();
    Audio.stopBGM();
    const isNewBest = state.score > state.bestScore;
    if (isNewBest) state.bestScore = Math.floor(state.score);
    document.getElementById('final-score').textContent = Math.floor(state.score);
    document.getElementById('best-score').textContent = Math.floor(state.bestScore);
    document.getElementById('final-coins').textContent = state.coins;
    document.getElementById('final-dist').textContent = Math.floor(state.distance) + 'm';
    document.getElementById('final-stage').textContent = state.reachedStage;
    document.getElementById('best-label').style.display = isNewBest ? 'block' : 'none';
    document.getElementById('gameover').classList.add('show');
  }

  function updateHUD() {
    document.getElementById('coin-count').textContent = state.coins;
    document.getElementById('multi').textContent = state.multi;
    document.getElementById('score').textContent = Math.floor(state.score);
    document.getElementById('distance').textContent = Math.floor(state.distance);
  }

  let lastT = performance.now();
  function animate(now) {
    requestAnimationFrame(animate);
    const dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;

    for (const c of clouds) {
      c.position.x -= c.userData.speed * dt;
      if (c.position.x < -30) c.position.x = 30;
    }

    if (!state.running) {
      const t = now * 0.001;
      player.rotation.y = Math.sin(t * 1.5) * 0.3;
      player.position.y = Math.abs(Math.sin(t * 4)) * 0.15;
    }

    if (state.running && !state.paused) {
      state.runTime += dt;
      state.targetSpeed = Math.min(state.maxSpeed, 12 + state.runTime * 0.25);
      state.speed += (state.targetSpeed - state.speed) * 0.02;

      // 파워업 처리
      let speedMult = 1;
      if (powerupState.boost > 0) speedMult = 1.6;
      else if (state.goldRushTime > 0) speedMult = 1.3;

      const effectiveSpeed = state.speed * speedMult;

      state.distance += effectiveSpeed * dt * 0.5;
      state.score += effectiveSpeed * dt * 0.8;

      progressMission('distance', 0, Math.floor(state.distance));

      // 스테이지 전환 체크
      const newStageIdx = Math.floor(state.distance / STAGE_DISTANCE);
      if (newStageIdx !== currentStage && newStageIdx > 0) {
        transitionToStage(newStageIdx);
        state.reachedStage = Math.max(state.reachedStage, (newStageIdx % STAGES.length) + 1);
        progressMission('stage', 0, state.reachedStage);
      }

      if (state.goldRushTime > 0) state.goldRushTime -= dt;

      // 파워업 타이머
      for (const key of ['magnet', 'shield', 'boost', 'x2']) {
        if (powerupState[key] > 0) {
          powerupState[key] -= dt;
          if (powerupState[key] <= 0) powerupState[key] = 0;
        }
      }
      updatePowerupUI();

      const targetX = LANE_X[state.laneTarget];
      const dx = targetX - player.position.x;
      player.position.x += dx * 0.25;
      player.rotation.z = -dx * 0.18;
      player.rotation.y = dx * 0.08;

      if (state.jumping) {
        player.position.y += state.jumpVel * dt;
        state.jumpVel -= 22 * dt;
        if (player.position.y <= 0) {
          player.position.y = 0;
          state.jumping = false;
          state.jumpVel = 0;
        }
      }
      if (state.sliding) {
        state.slideTimer -= dt;
        player.scale.y = 0.5;
        if (state.slideTimer <= 0) {
          state.sliding = false;
          player.scale.set(1, 1, 1);
        }
      }

      const hopPhase = state.runTime * 10;
      const hopY = Math.abs(Math.sin(hopPhase)) * 0.1;
      const legs = player.userData.legs;
      const arms = player.userData.arms;
      if (legs && !state.sliding) {
        if (state.jumping) {
          legs[0].rotation.x = -0.4; legs[1].rotation.x = -0.6;
          arms[0].rotation.x = -0.8; arms[1].rotation.x = -0.8;
        } else {
          legs[0].rotation.x = Math.sin(hopPhase) * 0.7;
          legs[1].rotation.x = -Math.sin(hopPhase) * 0.7;
          arms[0].rotation.x = -Math.sin(hopPhase) * 0.5;
          arms[1].rotation.x = Math.sin(hopPhase) * 0.5;
        }
      }
      if (player.userData.body && !state.jumping && !state.sliding) {
        player.userData.body.position.y = 0.55 + hopY;
        player.userData.head.position.y = 1.25 + hopY;
      }

      for (const seg of segments) {
        seg.position.z += effectiveSpeed * dt;
        if (seg.position.z > SEGMENT_LENGTH) {
          seg.position.z -= SEGMENT_COUNT * SEGMENT_LENGTH;
          spawnObjectsAhead(seg.position.z + SEGMENT_LENGTH/2);
        }
      }

      for (let i = activeObjects.length - 1; i >= 0; i--) {
        const obj = activeObjects[i];
        obj.mesh.position.z += effectiveSpeed * dt;
        if (obj.type === 'gold') {
          obj.mesh.rotation.y += dt * 2.5;
          obj.mesh.position.y = 0.5 + Math.sin(state.runTime * 4 + obj.z) * 0.08;
        } else if (obj.type === 'powerup') {
          obj.mesh.rotation.y += dt * 1.5;
          obj.mesh.position.y = Math.sin(state.runTime * 3 + obj.z) * 0.1;
        }
        if (obj.mesh.position.z > 8) {
          scene.remove(obj.mesh);
          activeObjects.splice(i, 1);
        }
      }

      checkCollision();

      camera.position.x += (player.position.x * 0.3 - camera.position.x) * 0.08;

      updateHUD();
    }

    renderer.render(scene, camera);
  }

  loadingEl.style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('start-screen').classList.remove('hidden');

  requestAnimationFrame(animate);

  document.querySelectorAll('.char-card').forEach(card => {
    card.addEventListener('click', () => {
      document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedChar = parseInt(card.dataset.char);
      scene.remove(player);
      player = createCharacter(selectedChar);
      player.position.set(LANE_X[state.laneTarget], 0, 0);
      scene.add(player);
    });
  });

  function startGame() {
    // 초기화
    state.running = true;
    state.paused = false;
    state.speed = 12;
    state.lane = 1;
    state.laneTarget = 1;
    state.jumpVel = 0;
    state.jumping = false;
    state.sliding = false;
    state.coins = 0;
    state.score = 0;
    state.multi = 1;
    state.runTime = 0;
    state.distance = 0;
    state.goldRushTime = 0;
    state.jumpCount = 0;
    state.slideCount = 0;
    state.reachedStage = 1;

    for (const k of ['magnet', 'shield', 'boost', 'x2']) powerupState[k] = 0;
    updatePowerupUI();

    // 스테이지 초기화
    if (currentStage !== 0) {
      transitionToStage(0);
    }

    // 첫 미션 선택 (랜덤)
    missionIdx = Math.floor(Math.random() * MISSION_POOL.length) - 1;
    selectNextMission();

    player.position.set(0, 0, 0);
    player.scale.set(1, 1, 1);
    player.rotation.set(0, 0, 0);

    for (const obj of activeObjects) scene.remove(obj.mesh);
    activeObjects.length = 0;
    segments.forEach((seg, i) => {
      seg.position.z = -i * SEGMENT_LENGTH + SEGMENT_LENGTH;
    });
    for (let i = 2; i < SEGMENT_COUNT; i++) {
      spawnObjectsAhead(-i * SEGMENT_LENGTH + SEGMENT_LENGTH/2);
    }

    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('gameover').classList.remove('show');
    updateHUD();

    // BGM 시작
    Audio.resume();
    Audio.startBGM(0);
  }

  document.getElementById('play-btn').addEventListener('click', startGame);
  document.getElementById('retry-btn').addEventListener('click', startGame);
  document.getElementById('pause-btn').addEventListener('click', () => {
    if (!state.running) return;
    state.paused = !state.paused;
    document.getElementById('pause-btn').textContent = state.paused ? '▶' : 'Ⅱ';
    // 일시정지 시 BGM도 정지
    if (state.paused) {
      Audio.stopBGM();
    } else {
      Audio.startBGM(currentStage);
    }
  });

  // 사운드 토글
  document.getElementById('sound-btn').addEventListener('click', () => {
    Audio.setEnabled(!Audio.enabled);
    const btn = document.getElementById('sound-btn');
    if (Audio.enabled) {
      btn.textContent = '🔊';
      btn.classList.remove('muted');
      if (state.running && !state.paused) {
        Audio.resume();
        Audio.startBGM(currentStage);
      }
    } else {
      btn.textContent = '🔇';
      btn.classList.add('muted');
    }
  });

  } catch (err) {
    loadingEl.classList.add('error');
    loadingEl.textContent = 'ERROR: ' + err.message + '\n\n' + (err.stack || '');
    console.error(err);
  }
})();
</script>
</body>
</html>
